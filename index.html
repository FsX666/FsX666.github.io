<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split race</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --run-color: #ff3f2d;
    --walk-color: #00d4aa;
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1f1f2e;
    --text: #f0f0f5;
    --muted: #5a5a72;
    --accent: #ff3f2d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 20px;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 60% at 50% 50%, #1a0a0a 0%, var(--bg) 70%);
    pointer-events: none;
    transition: background 1s ease;
    z-index: 0;
  }
  body.walking::before {
    background: radial-gradient(ellipse 60% 60% at 50% 50%, #001a16 0%, var(--bg) 70%);
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    align-items: center;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 8vw, 3rem);
    letter-spacing: 0.12em;
    color: var(--text);
    text-align: center;
  }
  h1 span { color: var(--run-color); }

  /* Phase indicator */
  .phase-ring {
    position: relative;
    width: 220px;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .phase-ring svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
  .ring-progress {
    fill: none;
    stroke: var(--run-color);
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 628;
    stroke-dashoffset: 628;
    transition: stroke-dashoffset 0.4s linear, stroke 0.5s ease;
  }

  .phase-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-align: center;
  }

  .phase-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.2rem, 9vw, 3.5rem);
    letter-spacing: 0.08em;
    line-height: 1;
    color: var(--run-color);
    transition: color 0.5s ease;
    animation: pulsate 1s ease-in-out infinite;
  }
  body.walking .phase-label { color: var(--walk-color); animation: none; }
  body.idle .phase-label { color: var(--muted); animation: none; }

  @keyframes pulsate {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .phase-countdown {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.05em;
    color: var(--muted);
    transition: color 0.5s;
  }
  body.walking .phase-countdown { color: var(--walk-color); opacity: 0.7; }

  /* Main timer */
  .timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 16vw, 6rem);
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--text);
    text-align: center;
  }

  /* Global progress bar */
  .global-progress {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
  }
  .global-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--run-color), var(--walk-color));
    border-radius: 100px;
    width: 0%;
    transition: width 0.5s linear;
  }

  /* Interval counter */
  .interval-info {
    display: flex;
    gap: 32px;
    justify-content: center;
    text-align: center;
  }
  .info-item { display: flex; flex-direction: column; gap: 4px; }
  .info-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .info-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    padding: 14px 32px;
    transition: all 0.2s ease;
  }
  .btn-primary {
    background: var(--run-color);
    color: #fff;
    font-size: 1.3rem;
    padding: 16px 48px;
  }
  .btn-primary:hover { background: #ff5c4d; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

  /* Settings */
  .settings-toggle {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s;
  }
  .settings-toggle:hover { color: var(--text); }
  .settings-toggle svg { transition: transform 0.3s; }
  .settings-toggle.open svg { transform: rotate(180deg); }

  .settings-panel {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: none;
    flex-direction: column;
    gap: 16px;
  }
  .settings-panel.visible { display: flex; }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .setting-label {
    font-size: 0.85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    flex: 1;
  }
  .setting-control {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .setting-control button {
    background: var(--border);
    border: none;
    color: var(--text);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .setting-control button:hover { background: var(--muted); }
  .setting-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.05em;
    color: var(--text);
    min-width: 60px;
    text-align: center;
  }

  /* Finish overlay */
  .finish-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    text-align: center;
    padding: 20px;
  }
  .finish-overlay.visible { display: flex; }
  .finish-emoji { font-size: 4rem; }
  .finish-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.1em;
    color: var(--walk-color);
  }
  .finish-stats {
    font-size: 1rem;
    color: var(--muted);
    line-height: 1.8;
  }
  .finish-stats strong { color: var(--text); }
</style>
</head>
<body class="idle">

<div class="container">
  <h1>SPLIT <span>RACE</span></h1>

  <!-- Phase ring -->
  <div class="phase-ring">
    <svg viewBox="0 0 220 220">
      <circle class="ring-bg" cx="110" cy="110" r="100"/>
      <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="100"/>
    </svg>
    <div class="phase-center">
      <div class="phase-label" id="phaseLabel">READY</div>
      <div class="phase-countdown" id="phaseCountdown">—</div>
    </div>
  </div>

  <!-- Main timer -->
  <div class="timer-display" id="mainTimer">00:00</div>

  <!-- Global progress -->
  <div class="global-progress">
    <div class="global-bar" id="globalBar"></div>
  </div>

  <!-- Stats -->
  <div class="interval-info">
    <div class="info-item">
      <div class="info-value" id="intervalCount">0</div>
      <div class="info-label">Intervals</div>
    </div>
    <div class="info-item">
      <div class="info-value" id="remainingTime">—</div>
      <div class="info-label">Remaining</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-secondary" id="resetBtn" disabled>RESET</button>
    <button class="btn btn-primary" id="startBtn">START</button>
  </div>

  <!-- Settings toggle -->
  <button class="settings-toggle" id="settingsToggle">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
      <path d="M6 8L1 3h10L6 8z"/>
    </svg>
    Settings
  </button>

  <!-- Settings panel -->
  <div class="settings-panel" id="settingsPanel">

    <div class="setting-row">
      <div class="setting-label">Interval (seconds)</div>
      <div class="setting-control">
        <button onclick="adjustSetting('interval', -5)">−</button>
        <div class="setting-value" id="intervalDisplay">30s</div>
        <button onclick="adjustSetting('interval', 5)">+</button>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-label">Total duration (minutes)</div>
      <div class="setting-control">
        <button onclick="adjustSetting('duration', -1)">−</button>
        <div class="setting-value" id="durationDisplay">17m</div>
        <button onclick="adjustSetting('duration', 1)">+</button>
      </div>
    </div>

  </div>
</div>

<!-- Finish overlay -->
<div class="finish-overlay" id="finishOverlay">
  <div class="finish-emoji">🏃</div>
  <div class="finish-title">WORKOUT DONE!</div>
  <div class="finish-stats" id="finishStats"></div>
  <button class="btn btn-primary" onclick="resetAll()">NEW SESSION</button>
</div>

<script>
// ─── Settings ────────────────────────────────────────────────────────────────
let settings = { interval: 30, duration: 17 };

// ─── State ───────────────────────────────────────────────────────────────────
let elapsed = 0;
let phaseElapsed = 0;
let isRunning = false;
let currentPhase = 'run';
let intervalCount = 0;
let ticker = null;
let startTimestamp = null;   // wall-clock reference for drift correction
let elapsedAtLastStart = 0;  // elapsed seconds when we last pressed start

const CIRCUMFERENCE = 2 * Math.PI * 100;

// ─── Web Audio (works in background / screen-lock) ───────────────────────────
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // Resume if suspended (iOS requires this after lock)
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playBeep(frequency, duration, type = 'sine', volume = 0.8, startTime = 0) {
  try {
    const ctx = getAudioCtx();
    const t = ctx.currentTime + startTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(frequency, t);
    gain.gain.setValueAtTime(volume, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.start(t);
    osc.stop(t + duration + 0.01);
  } catch(e) { console.warn('Audio error:', e); }
}

// Running cue: two sharp ascending beeps (unchanged — already great)
function beepRun() {
  playBeep(880,  0.12, 'square', 0.7, 0.0);
  playBeep(1100, 0.18, 'square', 0.8, 0.14);
}

// Walking cue: three loud descending tones — clearly audible, distinct from run
function beepWalk() {
  playBeep(660, 0.15, 'square', 0.85, 0.0);
  playBeep(550, 0.15, 'square', 0.85, 0.18);
  playBeep(440, 0.25, 'square', 0.85, 0.36);
}

// Finish cue: ascending chime
function beepFinish() {
  [523, 659, 784, 1047].forEach((f, i) => {
    playBeep(f, 0.35, 'sine', 0.7, i * 0.18);
  });
}

// ─── Speech via Web Audio (works in background on all devices) ───────────────
// Pre-encoded MP3 words spoken via the browser TTS engine, then re-routed
// through AudioContext so they play on the media channel even when locked.
// Strategy: use speechSynthesis AND simultaneously trigger beeps so at least
// one audio path always works. On iOS the voice uses the ringer channel when
// AudioContext is active, so both fire together.
const synth = window.speechSynthesis;

function speak(text) {
  if (!synth) return;
  // Don't cancel — let the current utterance finish naturally (very short words)
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 0.95;
  utter.pitch = 1.1;
  utter.volume = 1.0;
  synth.speak(utter);
}

// Keep speechSynthesis alive in background (Chrome/Android bug workaround)
setInterval(() => {
  if (isRunning && synth) {
    if (!synth.speaking && !synth.pending) synth.resume();
  }
}, 4000);

// ─── NoSleep: play a silent audio loop to prevent screen timeout ──────────────
let noSleepAudio = null;
function enableNoSleep() {
  if (noSleepAudio) return;
  try {
    const ctx = getAudioCtx();
    // Micro silent buffer replayed in a loop keeps audio session alive
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.5, ctx.sampleRate);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.loop = true;
    src.connect(ctx.destination);
    src.start();
    noSleepAudio = src;
  } catch(e) {}
}
function disableNoSleep() {
  if (noSleepAudio) { try { noSleepAudio.stop(); } catch(e){} noSleepAudio = null; }
}

// ─── Page Visibility API — catch up after screen unlock ──────────────────────
document.addEventListener('visibilitychange', () => {
  if (!isRunning) return;
  if (document.hidden) return;

  // Page is visible again — compute real elapsed from wall clock
  const realElapsed = elapsedAtLastStart + Math.floor((Date.now() - startTimestamp) / 1000);
  const totalSec = settings.duration * 60;

  if (realElapsed >= totalSec) {
    elapsed = totalSec;
    finish();
    return;
  }

  // Advance state to where we should be
  const delta = realElapsed - elapsed;
  if (delta > 0) catchUp(delta);
});

// Fast-forward state by `seconds` without re-announcing each tick
function catchUp(seconds) {
  const totalSec = settings.duration * 60;
  for (let i = 0; i < seconds; i++) {
    elapsed++;
    phaseElapsed++;
    if (elapsed >= totalSec) { finish(); return; }
    if (phaseElapsed >= settings.interval) {
      // Phase switch — only announce the LAST one
      const nextPhase = currentPhase === 'run' ? 'walk' : 'run';
      currentPhase = nextPhase;
      phaseElapsed = 0;
      if (nextPhase === 'run') intervalCount++;
    }
  }
  // Announce current phase after catch-up
  announcePhase(currentPhase, false);
  updateUI();
}

// ─── UI refs ─────────────────────────────────────────────────────────────────
const phaseLabel      = document.getElementById('phaseLabel');
const phaseCountdown  = document.getElementById('phaseCountdown');
const mainTimer       = document.getElementById('mainTimer');
const globalBar       = document.getElementById('globalBar');
const intervalCount_el= document.getElementById('intervalCount');
const remainingTime_el= document.getElementById('remainingTime');
const startBtn        = document.getElementById('startBtn');
const resetBtn        = document.getElementById('resetBtn');
const ringProgress    = document.getElementById('ringProgress');
const finishOverlay   = document.getElementById('finishOverlay');
const finishStats     = document.getElementById('finishStats');

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function updateUI() {
  const totalSec = settings.duration * 60;
  mainTimer.textContent = formatTime(elapsed);
  globalBar.style.width = ((elapsed / totalSec) * 100) + '%';
  remainingTime_el.textContent = formatTime(totalSec - elapsed);
  intervalCount_el.textContent = intervalCount;
  phaseCountdown.textContent = (settings.interval - phaseElapsed) + 's';
  const ringPct = phaseElapsed / settings.interval;
  ringProgress.style.strokeDashoffset = Math.max(0, CIRCUMFERENCE * (1 - ringPct));
}

function announcePhase(phase, withBeep = true) {
  if (phase === 'run') {
    phaseLabel.textContent = 'RUNNING';
    document.body.className = 'running';
    ringProgress.style.stroke = 'var(--run-color)';
    if (withBeep) {
      beepRun();          // fires immediately via Web Audio
      speak('Running');   // fires simultaneously via speechSynthesis
    }
  } else {
    phaseLabel.textContent = 'WALKING';
    document.body.className = 'walking';
    ringProgress.style.stroke = 'var(--walk-color)';
    if (withBeep) {
      beepWalk();         // fires immediately via Web Audio
      speak('Walking');   // fires simultaneously via speechSynthesis
    }
  }
}

function setPhase(phase) {
  currentPhase = phase;
  phaseElapsed = 0;
  if (phase === 'run') intervalCount++;
  announcePhase(phase, true);
}

// ─── Tick (1 Hz, drift-corrected) ────────────────────────────────────────────
function tick() {
  // Drift correction: trust the wall clock
  const realElapsed = elapsedAtLastStart + Math.floor((Date.now() - startTimestamp) / 1000);
  const delta = realElapsed - elapsed;

  if (delta <= 0) return; // Too early, skip

  const totalSec = settings.duration * 60;

  for (let i = 0; i < delta; i++) {
    elapsed++;
    phaseElapsed++;
    if (elapsed >= totalSec) { finish(); return; }
    if (phaseElapsed >= settings.interval) {
      setPhase(currentPhase === 'run' ? 'walk' : 'run');
    }
  }
  updateUI();
}

// ─── Controls ────────────────────────────────────────────────────────────────
function start() {
  // Unlock audio context on first user gesture
  getAudioCtx();

  if (isRunning) {
    clearInterval(ticker);
    isRunning = false;
    startBtn.textContent = 'RESUME';
    synth && synth.cancel();
    disableNoSleep();
    return;
  }

  isRunning = true;
  startBtn.textContent = 'PAUSE';
  resetBtn.disabled = false;
  enableNoSleep();

  if (elapsed === 0) {
    setPhase('run');
    phaseElapsed = 0;
  }

  // Anchor wall clock
  elapsedAtLastStart = elapsed;
  startTimestamp = Date.now();

  ticker = setInterval(tick, 250); // Poll 4× per second for accuracy
}

function finish() {
  clearInterval(ticker);
  isRunning = false;
  disableNoSleep();
  document.body.className = '';
  beepFinish();
  speak('Workout complete! Great job!');
  finishStats.innerHTML = `
    Duration: <strong>${formatTime(elapsed)}</strong><br>
    Intervals completed: <strong>${intervalCount}</strong><br>
    Interval length: <strong>${settings.interval}s</strong>
  `;
  finishOverlay.classList.add('visible');
}

function resetAll() {
  clearInterval(ticker);
  isRunning = false;
  elapsed = 0; phaseElapsed = 0; intervalCount = 0;
  currentPhase = 'run';
  startTimestamp = null; elapsedAtLastStart = 0;
  document.body.className = 'idle';
  phaseLabel.textContent = 'READY';
  phaseCountdown.textContent = '—';
  mainTimer.textContent = '00:00';
  globalBar.style.width = '0%';
  intervalCount_el.textContent = '0';
  remainingTime_el.textContent = '—';
  ringProgress.style.strokeDashoffset = CIRCUMFERENCE;
  ringProgress.style.stroke = 'var(--run-color)';
  startBtn.textContent = 'START';
  resetBtn.disabled = true;
  finishOverlay.classList.remove('visible');
  synth && synth.cancel();
  disableNoSleep();
}

startBtn.addEventListener('click', start);
resetBtn.addEventListener('click', resetAll);

// ─── Settings ────────────────────────────────────────────────────────────────
const settingsToggle = document.getElementById('settingsToggle');
const settingsPanel  = document.getElementById('settingsPanel');

settingsToggle.addEventListener('click', () => {
  const open = settingsPanel.classList.toggle('visible');
  settingsToggle.classList.toggle('open', open);
});

function adjustSetting(key, delta) {
  if (isRunning || elapsed > 0) return;
  if (key === 'interval') {
    settings.interval = Math.max(5, Math.min(300, settings.interval + delta));
    document.getElementById('intervalDisplay').textContent = settings.interval + 's';
  } else if (key === 'duration') {
    settings.duration = Math.max(1, Math.min(120, settings.duration + delta));
    document.getElementById('durationDisplay').textContent = settings.duration + 'm';
  }
}

// Init
ringProgress.style.strokeDashoffset = CIRCUMFERENCE;
</script>
</body>
</html>
